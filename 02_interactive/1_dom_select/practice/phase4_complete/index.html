<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phase 4 - 완성본</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="app">
      <div class="app-header">
        <h1 id="app-title">나만의 Todo 앱</h1>
        <p>오늘도 하나씩 해봐요 💪</p>
        <div class="summary">
          남은 할 일: <span id="remaining-count">0</span>개
        </div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <input
            type="text"
            id="todo-input"
            placeholder="할 일을 입력하세요 (Enter도 됩니다)"
          />
          <button class="btn-add" id="add-btn">추가</button>
        </div>
      </div>

      <ul class="todo-list" id="todo-list">
        <li class="empty-message">할 일을 추가해보세요!</li>
      </ul>

      <div class="footer">
        <button class="btn-clear" id="clear-btn">완료 항목 삭제</button>
      </div>
    </div>
  </body>
</html>
